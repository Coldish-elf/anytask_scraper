name: Bug Report
description: Report a bug in anytask-scraper
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `pip show anytask-scraper | grep Version`"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: "Output of `python --version`"
    validations:
      required: true
